{% extends "base.html" %}
{% block title %}Login Prof{% endblock %}
{% block content %}
  <div class="top-bar">
    <a href="{{ url_for('routes.scan_prof') }}" class="btn">⬅ Retour</a>
  </div>
  <h2>Connexion Professeur</h2>
  <form method="POST">
    <input type="text" name="code" placeholder="Votre ID Professeur" required>
    <input type="text" name="cours" placeholder="Nom du cours" required>
    <button type="submit" class="btn primary">Connexion</button>
  </form>
{% endblock %}
